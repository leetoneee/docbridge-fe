<header class="flex h-16 shrink-0 items-center justify-between border-b border-border bg-surface px-6">

  <!-- Breadcrumbs -->
  <nav class="flex items-center gap-1.5 text-sm" aria-label="Breadcrumb">
    @for (crumb of breadcrumbs(); track crumb.label; let last = $last) {
    @if (!$first) {
    <svg icon class="size-3.5 text-text-muted" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
      stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="m9 18 6-6-6-6" />
    </svg>
    }
    @if (crumb.route) {
    <a [routerLink]="crumb.route" class="text-text-secondary transition-colors hover:text-foreground">
      {{ crumb.label }}
    </a>
    } @else {
    <span class="font-medium text-foreground">{{ crumb.label }}</span>
    }
    }
  </nav>

  <div class="flex items-center gap-3">
    <!-- Notification bell — TODO: nối API notifications khi có endpoint -->
    <!-- <button type="button" aria-label="Thông báo"
      class="relative flex size-9 items-center justify-center rounded-full text-text-secondary transition-colors hover:bg-muted">
      <svg icon class="size-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9" />
        <path d="M10.3 21a1.94 1.94 0 0 0 3.4 0" />
      </svg> -->
    <!-- Badge dot — hiện khi có thông báo chưa đọc, ẩn khi không có -->
    <!-- <span class="absolute right-2 top-2 size-1.5 rounded-full bg-primary"></span> -->
    <!-- </button> -->

    <!-- User button → profile modal -->
    <button class="flex items-center gap-3 px-2 py-1 rounded-lg transition-colors hover:bg-muted" type="button"
      (click)="profileModal.toggle()">
      <div class="text-right">
        <p class="text-[13px] font-medium text-foreground">{{ currentUser.email() }}</p>
        <app-role-badge [roleCode]="role()"></app-role-badge>
      </div>
      <span
        class="flex size-8 items-center justify-center rounded-full bg-primary text-xs font-semibold text-primary-foreground">
        {{ currentUser.initials() }}
      </span>
    </button>
  </div>
</header>

<app-profile-modal #profileModal></app-profile-modal>
