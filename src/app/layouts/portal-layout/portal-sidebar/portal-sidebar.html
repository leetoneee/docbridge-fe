<aside class="flex w-65 shrink-0 flex-col border-r border-border bg-surface">

  <!-- Logo -->
  <div class="flex items-center gap-2 px-4 py-4">
    <span class="flex size-7 items-center justify-center rounded-md bg-primary text-primary-foreground">
      <svg icon class="size-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="16" y="16" width="6" height="6" rx="1"/>
        <rect x="2" y="16" width="6" height="6" rx="1"/>
        <rect x="9" y="2" width="6" height="6" rx="1"/>
        <path d="M5 16v-4h14v4"/><path d="M12 12V8"/>
      </svg>
    </span>
    <span class="text-base font-semibold text-foreground">DocBridge</span>
  </div>

  <!-- Nav -->
  <nav class="flex-1 overflow-y-auto pb-2">
    <p class="px-4 pb-1 pt-4 text-[11px] font-semibold uppercase tracking-wide text-text-muted">
      Văn bản
    </p>
    <a
      routerLink="/portal/inbox"
      routerLinkActive="border-l-[3px] border-primary bg-primary/5 pl-[7px] font-medium text-primary"
      class="mx-2 flex items-center gap-2.5 rounded-md px-2.5 py-2 text-sm text-text-secondary transition-colors hover:bg-secondary"
    >
      <!-- Inbox icon -->
      <svg icon class="size-4 shrink-0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/>
        <path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/>
      </svg>
      Hộp thư đến
    </a>
    <a
      routerLink="/portal/outbox"
      routerLinkActive="border-l-[3px] border-primary bg-primary/5 pl-[7px] font-medium text-primary"
      class="mx-2 flex items-center gap-2.5 rounded-md px-2.5 py-2 text-sm text-text-secondary transition-colors hover:bg-secondary"
    >
      <!-- Send icon -->
      <svg icon class="size-4 shrink-0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/>
      </svg>
      Hộp thư đi
    </a>
  </nav>

  <!-- Footer -->
  <div class="mt-auto border-t border-border px-3 py-3">
    <div class="px-1 py-1.5">
      <p class="text-[13px] font-medium text-foreground">{{ currentUser.email() }}</p>
      <!-- Unit badge -->
      <span class="mt-1 inline-flex items-center rounded-full border border-status-sent-border bg-status-sent-bg px-2 py-0.5 font-mono text-[11px] text-[#1D4ED8]">
        {{ currentUser.unitId() ? 'DVLT-' + currentUser.unitId() : '' }}
      </span>
    </div>
    <div class="mt-1 flex flex-col gap-0.5">
      <button
        type="button"
        (click)="onChangePassword()"
        class="flex w-full items-center gap-2 rounded-md px-2 py-1.5 text-[13px] text-text-secondary transition-colors hover:bg-secondary"
      >
        <svg icon class="size-3.5 shrink-0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="7" cy="17" r="3"/><path d="M10.26 17H14l1-4H7.26"/>
          <path d="m20 7-6 6"/><path d="m14 7 6 6"/>
        </svg>
        Đổi mật khẩu
      </button>
      <button
        type="button"
        (click)="onLogout()"
        class="flex w-full items-center gap-2 rounded-md px-2 py-1.5 text-[13px] text-text-secondary transition-colors hover:bg-secondary"
      >
        <svg icon class="size-3.5 shrink-0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Đăng xuất
      </button>
    </div>
  </div>

</aside>
