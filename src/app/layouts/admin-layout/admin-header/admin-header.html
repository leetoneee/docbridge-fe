<header class="flex h-16 shrink-0 items-center justify-between border-b border-border bg-surface px-6">

  <!-- Breadcrumbs -->
  <nav class="flex items-center gap-1.5 text-sm" aria-label="Breadcrumb">
    @for (crumb of breadcrumbs(); track crumb.label; let last = $last) {
    @if (!$first) {
    <!-- ChevronRight -->
    <svg class="size-3.5 text-text-muted" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
      stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="m9 18 6-6-6-6" />
    </svg>
    }
    @if (crumb.route) {
    <a [routerLink]="crumb.route" class="text-text-secondary transition-colors hover:text-foreground">
      {{ crumb.label }}
    </a>
    } @else {
    <span class="font-medium text-foreground">{{ crumb.label }}</span>
    }
    }
  </nav>

  <!-- User info -->
  <div class="flex items-center gap-3">
    <div class="text-right">
      <p class="text-[13px] font-medium text-foreground">{{ currentUser.email() }}</p>
      <p
        class="bg-status-sent-bg inline-flex h-4 items-center rounded-full px-1.5 text-[11px] font-medium text-[#1D4ED8]">
        {{ currentUser.roleLabel() }}</p>
    </div>
    <span
      class="flex size-8 items-center justify-center rounded-full bg-primary text-xs font-semibold text-primary-foreground">
      {{ currentUser.initials() }}
    </span>
  </div>

</header>
