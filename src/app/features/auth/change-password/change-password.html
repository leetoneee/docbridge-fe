<div class="flex min-h-screen w-full items-center justify-center bg-foreground/40 p-6">
  <div class="w-full max-w-140 rounded-[10px] border border-border bg-surface shadow-[0_10px_40px_rgba(0,0,0,0.18)]">

    <!-- Header -->
    <div class="flex items-start gap-3 border-b border-border p-6">
      <div class="flex size-10 shrink-0 items-center justify-center rounded-lg bg-primary/10">
        <svg icon xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
          class="lucide lucide-key-round-icon lucide-key-round size-5 shrink-0 text-primary">
          <path
            d="M2.586 17.414A2 2 0 0 0 2 18.828V21a1 1 0 0 0 1 1h3a1 1 0 0 0 1-1v-1a1 1 0 0 1 1-1h1a1 1 0 0 0 1-1v-1a1 1 0 0 1 1-1h.172a2 2 0 0 0 1.414-.586l.814-.814a6.5 6.5 0 1 0-4-4z" />
          <circle cx="16.5" cy="7.5" r=".5" fill="currentColor" />
        </svg>
      </div>
      <div class="flex flex-1 flex-col gap-0.5">
        <h2 class="text-base font-semibold text-foreground">Đổi mật khẩu</h2>
        <p class="text-[13px] text-text-secondary">Cập nhật mật khẩu đăng nhập của bạn</p>
      </div>
      <!-- Nút đóng -->
      <button
        type="button"
        aria-label="Đóng"
        (click)="onClose()"
        class="-mr-1 -mt-1 flex size-8 items-center justify-center rounded-md text-text-muted transition-colors hover:bg-secondary hover:text-text-secondary"
      >
        <svg icon class="size-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 6 6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <!-- Body -->
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-4 p-6">

      <app-password-field
        label="Mật khẩu hiện tại"
        formControlName="currentPassword"
      />

      <div class="flex flex-col gap-1.5">
        <app-password-field
          label="Mật khẩu mới"
          formControlName="newPassword"
          [error]="newPwdError"
        />
        <app-password-strength [level]="strengthLevel" />
      </div>

      <app-password-field
        label="Xác nhận mật khẩu mới"
        formControlName="confirmPassword"
        [error]="confirmError"
      />

      @if (serverError()) {
        <p class="text-sm text-destructive">{{ serverError() }}</p>
      }

      <!-- Footer -->
      <div class="flex items-center justify-end gap-3 border-t border-border pt-6">
        <button
          type="button"
          (click)="onClose()"
          class="h-10 rounded-lg px-4 text-sm font-medium text-text-secondary transition-colors hover:bg-secondary hover:text-foreground"
        >
          Hủy
        </button>
        <button
          type="submit"
          [disabled]="isLoading()"
          class="h-10 rounded-lg bg-primary px-4 text-sm font-medium text-primary-foreground transition-colors hover:bg-primary-hover disabled:cursor-not-allowed disabled:opacity-50"
        >
          {{ isLoading() ? 'Đang xử lý...' : 'Xác nhận' }}
        </button>
      </div>

    </form>
  </div>
</div>
