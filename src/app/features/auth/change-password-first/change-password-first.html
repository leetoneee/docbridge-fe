<div class="flex min-h-screen w-full items-center justify-center bg-foreground/40 p-6">
  <div class="w-full max-w-140 rounded-[10px] border border-border bg-surface shadow-[0_10px_40px_rgba(0,0,0,0.18)]">

    <!-- Header -->
    <div class="flex items-start gap-3 border-b border-border p-6">
      <div class="flex size-10 shrink-0 items-center justify-center rounded-lg bg-status-pending-bg">
        <!-- Shield Alert icon -->
        <svg icon class="size-5 text-warning" xmlns="http://www.w3.org/2000/svg"
             viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/>
          <path d="M12 8v4"/><path d="M12 16h.01"/>
        </svg>
      </div>
      <div class="flex flex-col gap-0.5">
        <h2 class="text-base font-semibold text-foreground">Đổi mật khẩu lần đầu</h2>
        <p class="text-[13px] text-text-secondary">
          Thiết lập mật khẩu mới để bảo vệ tài khoản của bạn
        </p>
      </div>
    </div>

    <!-- Body -->
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-4 p-6">

      <!-- Banner cảnh báo -->
      <div class="flex items-start gap-2 rounded-md border border-warning/30 bg-status-pending-bg px-3 py-2.5">
        <!-- Alert Triangle icon -->
        <svg icon class="mt-0.5 size-4 shrink-0 text-warning" xmlns="http://www.w3.org/2000/svg"
             viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/>
          <path d="M12 9v4"/><path d="M12 17h.01"/>
        </svg>
        <p class="text-[13px] leading-relaxed text-warning">
          Bạn đang sử dụng mật khẩu tạm thời. Vui lòng đổi mật khẩu trước khi tiếp tục.
        </p>
      </div>

      <!-- Mật khẩu tạm thời -->
      <app-password-field
        label="Mật khẩu tạm thời"
        formControlName="tempPassword"
        [showToggle]="false"
      />

      <!-- Mật khẩu mới + strength -->
      <div class="flex flex-col gap-1.5">
        <app-password-field
          label="Mật khẩu mới"
          formControlName="newPassword"
          [error]="newPwdError"
        />
        <app-password-strength [level]="strengthLevel" />
      </div>

      <!-- Xác nhận mật khẩu -->
      <app-password-field
        label="Xác nhận mật khẩu mới"
        formControlName="confirmPassword"
        [error]="confirmError"
      />

      <!-- Server error -->
      @if (serverError()) {
        <p class="text-sm text-destructive">{{ serverError() }}</p>
      }

      <!-- Footer -->
      <div class="border-t border-border pt-6">
        <button
          type="submit"
          [disabled]="isLoading()"
          class="h-10 w-full rounded-lg bg-primary text-sm font-medium text-primary-foreground transition-colors hover:bg-primary-hover disabled:opacity-50 disabled:cursor-not-allowed"
        >
          @if (isLoading()) {
            <span>Đang xử lý...</span>
          } @else {
            <span>Xác nhận đổi mật khẩu</span>
          }
        </button>
      </div>
    </form>

  </div>
</div>
