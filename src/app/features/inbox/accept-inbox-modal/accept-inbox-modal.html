<app-modal title="Chấp nhận văn bản" [open]="open()" (openChange)="close()">
  <svg icon xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
    class="size-5 text-success">
    <path stroke-linecap="round" stroke-linejoin="round"
      d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
  </svg>

  <div class="flex flex-col gap-4">
    <p class="text-sm leading-6 text-text-secondary">
      Xác nhận đã tiếp nhận văn bản này. Hành động này không thể hoàn tác.
    </p>

    <!-- Summary -->
    @if (tx()) {
    <div class="rounded-lg bg-muted p-3 space-y-1">
      <div class="flex items-center justify-between gap-3 py-0.5">
        <span class="text-xs text-text-muted">Số hiệu văn bản</span>
        <span class="text-xs font-medium text-foreground">{{ tx()!.documentCode }}</span>
      </div>
      <div class="flex items-center justify-between gap-3 py-0.5">
        <span class="text-xs text-text-muted">Đơn vị gửi</span>
        <span class="text-xs font-medium text-foreground">{{ tx()!.sender.name }}</span>
      </div>
    </div>
    }

    <!-- Error -->
    @if (errorMessage()) {
    <div class="rounded-lg border border-destructive/20 bg-destructive/5 px-3 py-2">
      <p class="text-sm text-destructive">{{ errorMessage() }}</p>
    </div>
    }
  </div>

  <div footer class="flex items-center justify-end gap-2">
    <button type="button"
      class="inline-flex h-9 items-center rounded-lg px-3 text-sm font-medium text-foreground hover:bg-muted disabled:opacity-60"
      [disabled]="submitting()" (click)="close()">
      Huỷ
    </button>
    <button type="button"
      class="inline-flex h-9 items-center gap-1.5 rounded-lg bg-primary px-3 text-sm font-medium text-primary-foreground hover:bg-primary-hover disabled:opacity-60"
      [disabled]="submitting()" (click)="onConfirm()">
      @if (submitting()) {
      <svg class="size-4 animate-spin" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z" />
      </svg>
      }
      Xác nhận chấp nhận
    </button>
  </div>
</app-modal>
