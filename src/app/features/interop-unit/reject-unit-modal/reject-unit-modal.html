<app-confirm-dialog [open]="open()" title="Từ chối đơn vị liên thông"
  description="Hành động này sẽ từ chối yêu cầu tham gia của đơn vị." [requireReason]="true" reasonLabel="Lý do từ chối"
  reasonPlaceholder="Nhập lý do từ chối..." confirmLabel="Xác nhận từ chối" cancelLabel="Huỷ" [loading]="submitting()"
  (openChange)="openChange.emit($event)" (confirm)="onConfirm($event)">
  <svg icon xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
    stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-circle-x-icon lucide-circle-x size-5">
    <circle cx="12" cy="12" r="10" />
    <path d="m15 9-6 6" />
    <path d="m9 9 6 6" />
  </svg>
</app-confirm-dialog>
