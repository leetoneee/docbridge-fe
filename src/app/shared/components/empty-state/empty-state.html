<div class="flex flex-col items-center justify-center gap-3 px-6 py-16 text-center">
  <div class="flex size-12 items-center justify-center rounded-full border border-border bg-muted text-muted-foreground">
    <ng-content select="[icon]"></ng-content>
  </div>
  <div class="flex flex-col space-y-1">
    <p class="text-base font-semibold text-foreground">{{ title() }}</p>
    @if (subtitle()) {
      <p class="text-sm text-text-secondary">{{ subtitle() }}</p>
    }
  </div>
  <div class="mt-2">
    <ng-content select="[action]"></ng-content>
  </div>
</div>
