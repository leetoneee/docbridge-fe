@if (open()) {
<div class="fixed inset-0 z-50 flex items-center justify-center bg-foreground/40 p-4" (click)="onBackdropClick()">
  <div
    class="relative grid w-full gap-4 rounded-xl border border-border bg-surface p-4 text-sm shadow-[0_8px_24px_rgba(0,0,0,0.12)]"
    [style.maxWidth]="maxWidth()" (click)="$event.stopPropagation()">
    <button type="button"
      class="absolute top-2 right-2 flex size-7 items-center justify-center rounded-md text-text-muted hover:bg-muted hover:text-foreground"
      aria-label="Đóng" (click)="close()">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
        class="lucide lucide-x-icon lucide-x size-4">
        <path d="M18 6 6 18" />
        <path d="m6 6 12 12" />
      </svg> </button>

    <div class="flex flex-row items-center gap-3 pr-6">
      <ng-content select="[icon]"></ng-content>
      <h2 class="text-base font-medium leading-none text-foreground">{{ title() }}</h2>
    </div>

    <ng-content></ng-content>

    <div
      class="-mx-4 -mb-4 flex flex-col-reverse gap-2 rounded-b-xl border-t border-border bg-muted/50 p-4 sm:flex-row sm:justify-end">
      <ng-content select="[footer]"></ng-content>
    </div>
  </div>
</div>
}
