@if (open()) {
<div class="fixed inset-0 z-50 flex items-center justify-center bg-foreground/40 p-4" (click)="close()">
  <div
    class="w-full max-w-100 flex flex-col gap-4 rounded-[10px] border border-border bg-surface p-5 shadow-[0_8px_24px_rgba(0,0,0,0.12)]"
    (click)="$event.stopPropagation()">
    <div class="flex items-center gap-3">
      <span class="flex size-9 shrink-0 items-center justify-center rounded-full" [class]="
            iconTone() === 'destructive'
              ? 'bg-destructive/10 text-destructive'
              : iconTone() === 'warning'
                ? 'bg-warning/10 text-warning'
                : 'bg-primary/10 text-primary'
          ">
        <ng-content select="[icon]"></ng-content>
      </span>
      <h2 class="text-base font-semibold text-foreground">{{ title() }}</h2>
    </div>

    @if (description()) {
    <p class="text-sm text-text-secondary">{{ description() }}</p>
    }

    @if (requireReason()) {
    <div class="flex flex-col space-y-1.5">
      <label class="flex items-center gap-2 text-sm font-medium text-foreground">
        {{ reasonLabel() }} <span class="text-destructive">*</span>
      </label>
      <textarea rows="3" [placeholder]="reasonPlaceholder()" [value]="reason()" (input)="onReasonInput($event)"
        class="min-h-16 w-full rounded-lg border border-input bg-transparent px-2.5 py-2 text-sm outline-none placeholder:text-text-muted focus-visible:border-ring focus-visible:ring-3 focus-visible:ring-ring/50"></textarea>
    </div>
    }

    @if (errorMessage()) {
    <p class="flex items-center gap-1.5 rounded-lg bg-destructive/10 px-3 py-2 text-sm text-destructive">
      <svg icon xmlns="http://www.w3.org/2000/svg" class="size-4 shrink-0" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10" />
        <line x1="12" y1="8" x2="12" y2="12" />
        <line x1="12" y1="16" x2="12.01" y2="16" />
      </svg>
      {{ errorMessage() }}
    </p>
    }

    <div class="flex items-center justify-end gap-2 pt-1">
      <button type="button"
        class="h-9 rounded-lg px-2.5 text-sm font-medium text-foreground hover:bg-muted disabled:pointer-events-none disabled:opacity-50"
        [disabled]="loading()" (click)="close()">
        {{ cancelLabel() }}
      </button>
      <button type="button"
        class="h-9 rounded-lg px-2.5 text-sm font-medium transition-colors disabled:pointer-events-none disabled:opacity-50"
        [class]="
            destructive()
              ? 'bg-destructive/10 text-destructive hover:bg-destructive/20'
              : 'bg-primary text-primary-foreground hover:bg-primary-hover'
          " [disabled]="loading() || (requireReason() && reason().trim().length === 0)" (click)="onConfirm()">
        {{ confirmLabel() }}
      </button>
    </div>
  </div>
</div>
}
