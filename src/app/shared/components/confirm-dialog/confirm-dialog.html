@if (open()) {
  <div
    class="fixed inset-0 z-50 flex items-center justify-center bg-foreground/40 p-4"
    (click)="close()"
  >
    <div
      class="w-full max-w-100 space-y-4 rounded-[10px] border border-border bg-surface p-5 shadow-[0_8px_24px_rgba(0,0,0,0.12)]"
      (click)="$event.stopPropagation()"
    >
      <div class="flex items-center gap-3">
        <span
          class="flex size-9 shrink-0 items-center justify-center rounded-full"
          [class]="
            iconTone() === 'destructive'
              ? 'bg-destructive/10 text-destructive'
              : iconTone() === 'warning'
                ? 'bg-warning/10 text-warning'
                : 'bg-primary/10 text-primary'
          "
        >
          <ng-content select="[icon]"></ng-content>
        </span>
        <h2 class="text-base font-semibold text-foreground">{{ title() }}</h2>
      </div>

      @if (description()) {
        <p class="text-sm text-text-secondary">{{ description() }}</p>
      }

      <div class="flex items-center justify-end gap-2 pt-1">
        <button
          type="button"
          class="h-9 rounded-lg px-2.5 text-sm font-medium text-foreground hover:bg-muted disabled:pointer-events-none disabled:opacity-50"
          [disabled]="loading()"
          (click)="close()"
        >
          {{ cancelLabel() }}
        </button>
        <button
          type="button"
          class="h-9 rounded-lg px-2.5 text-sm font-medium transition-colors disabled:pointer-events-none disabled:opacity-50"
          [class]="
            destructive()
              ? 'bg-destructive/10 text-destructive hover:bg-destructive/20'
              : 'bg-primary text-primary-foreground hover:bg-primary-hover'
          "
          [disabled]="loading()"
          (click)="onConfirm()"
        >
          {{ confirmLabel() }}
        </button>
      </div>
    </div>
  </div>
}
